<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Demo Mod - Train Simulator Mod Archive</title>
  <link rel="icon" type="image/x-icon" href="https://www.trainsimarchive.org/favicon/favicon.ico">
  <style>
    :root { color-scheme: dark; }
    body { font-family: Arial, sans-serif; background: #111; color: #f5f5f5; margin: 0; min-height: 100vh; padding: 2rem; line-height: 1.5; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    a { color: #7dd3fc; }
    #content { line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap" id="content">Loading dynamic content…</div>
  <script>
    (async () => {
      const targetUrl = 'https://api.trainsimarchive.org/democreator/dynamic-demo-mod';
      try {
        const response = await fetch(targetUrl);
        if (!response.ok) throw new Error('Failed');
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        document.title = doc.title || 'Dynamic Demo Mod - Train Simulator Mod Archive';
        document.getElementById('content').innerHTML = doc.body.innerHTML;
      } catch (error) {
        document.getElementById('content').innerHTML = '<p>The dynamic page could not be loaded right now. Please try again shortly.</p>';
      }
    })();
  </script>
</body>
</html>
